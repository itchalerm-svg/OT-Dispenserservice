<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CHALERMCHAICHAN SYSTEM</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#ef4d4d">

  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background-color: #FFF0F5; 
      overflow: hidden;
    }

    .app-container {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    #loading-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #FFF0F5; 
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 99;
      transition: opacity 0.4s ease;
    }

    .loader {
      width: 45px; height: 45px;
      border: 4px solid rgba(0,0,0,0.1);
      border-top: 4px solid #ef4d4d; 
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="loading-screen">
    <div class="loader"></div>
    <div style="color: #333333; margin-top: 15px; font-family: sans-serif; font-size: 14px; letter-spacing: 1px; font-weight: bold;">กำลังโหลดระบบ...</div>
  </div>

  <div class="app-container">
    <iframe
      id="appFrame"
      src="https://google.com"
      allow="geolocation *; camera *; microphone *"
      scrolling="yes"
      onload="hideLoader()"> 
    </iframe>
  </div>

  <script>
    function hideLoader() {
      const loader = document.getElementById('loading-screen');
      if (loader) {
        loader.style.opacity = '0';
        setTimeout(function() {
          loader.style.display = 'none';
        }, 400);
      }
    }

    document.addEventListener('touchmove', function(e) {
      if (e.scale !== 1) { e.preventDefault(); }
    }, { passive: false });
  </script>

</body>
</html>
