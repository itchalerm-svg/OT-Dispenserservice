<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OT DISPENSER SERVICE</title>
  
  <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1GhR1quDqH5UIkMWIygRGM1zT34W3kGOW">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <!-- Theme Bar บนมือถือใช้โทนม่วงเข้มรับกับ Sidebar -->
  <meta name="theme-color" content="#1e1b4b">

  <!-- เร่งความเร็วการดึงข้อมูลจาก Google Apps Script -->
  <link rel="preconnect" href="https://script.google.com" crossorigin>
  <link rel="dns-prefetch" href="https://script.google.com">

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0; 
      padding: 0;
      width: 100%; 
      height: 100%;
      height: 100dvh; /* ป้องกันแถบ Browser ดันหน้าจอบนมือถือ */
      background-color: #f8fafc; /* สีพื้นหลังสว่าง โทนเดียวกับหน้า Dashboard */
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    .app-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      opacity: 0;
      transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      -webkit-overflow-scrolling: touch;
    }

    /* Loading Screen แบบ Minimal Luxe โทนสว่างเรียบหรู */
    #loading-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 99;
      transition: opacity 0.35s ease, visibility 0.35s;
    }

    /* Loader วงแหวนไล่เฉดสี ม่วง-ชมพู เบาและโหลดไวมาก */
    .lux-spinner {
      width: 38px;
      height: 38px;
      border: 3px solid #e2e8f0;
      border-top: 3px solid #8b5cf6;
      border-right: 3px solid #ec4899;
      border-radius: 50%;
      animation: spin 0.7s cubic-bezier(0.55, 0.15, 0.45, 0.85) infinite;
    }

    @keyframes spin { 
      0% { transform: rotate(0deg); } 
      100% { transform: rotate(360deg); } 
    }

    .loading-title {
      color: #334155;
      margin-top: 14px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      opacity: 0.85;
    }
  </style>
</head>
<body>

  <!-- Loading Screen สไตล์เรียบหรู -->
  <div id="loading-screen">
    <div class="lux-spinner"></div>
    <div class="loading-title">กำลังโหลด...</div>
  </div>

  <div class="app-container">
    <iframe
      id="appFrame"
      src="https://script.google.com/macros/s/AKfycbwXBDUn2vDHmZ0umvfRWLFAX9P2DliKcSJE4O_cYLcb1Skm66-VBUvKZX3k1FP9--4Dww/exec"
      allow="geolocation; camera; microphone"
      scrolling="yes"
      onload="hideLoader()"> 
    </iframe>
  </div>

  <script>
    function hideLoader() {
      const loader = document.getElementById('loading-screen');
      const frame = document.getElementById('appFrame');
      
      frame.style.opacity = '1';
      loader.style.opacity = '0';
      
      setTimeout(function() {
        loader.style.visibility = 'hidden';
      }, 350);
    }

    // ปรับความสูง iframe เมื่อมีการส่งค่ามาจาก Google Apps Script
    window.addEventListener('message', function(e) {
      if (e.data && e.data.frameHeight) {
        var frame = document.getElementById('appFrame');
        if (frame) {
          frame.style.height = e.data.frameHeight + 'px';
        }
      }
    }, false);

    // Safety Timeout: หากผ่านไป 4 วินาทีแล้ว iframe ยังไม่ส่ง onload ให้ซ่อนหน้าโหลดทันที
    setTimeout(hideLoader, 4000);

    // ป้องกันการ Pinch-zoom บนมือถือ
    document.addEventListener('touchmove', function(e) {
      if (e.scale && e.scale !== 1) { 
        e.preventDefault(); 
      }
    }, { passive: false });
  </script>

</body>
</html>
