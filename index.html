<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OT DispenserService</title>
  
  <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1GhR1quDqH5UIkMWIygRGM1zT34W3kGOW">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <!-- ปรับ Theme Bar บนเบราว์เซอร์มือถือให้เป็นโทนม่วงเข้มตามแอป -->
  <meta name="theme-color" content="#1a1c2e">

  <link rel="preconnect" href="https://script.google.com" crossorigin>
  <link rel="dns-prefetch" href="https://script.google.com">

  <style>
    html, body {
      margin: 0; 
      padding: 0;
      width: 100%; 
      height: 100%;
      height: 100dvh; /* ป้องกันแถบการใช้งานบนมือถือบังเนื้อหา */
      background-color: #1a1c2e; /* พื้นหลังสีม่วงเข้มโทนสากล */
      overflow: hidden;
    }

    .app-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      opacity: 0;
      transition: opacity 0.35s ease-in-out;
      -webkit-overflow-scrolling: touch; /* เพิ่มความลื่นไหลในการเลื่อนหน้าจอบน iOS */
    }

    /* หน้าจอระหว่างรอโหลด (Loading Screen) โทน Executive Purple */
    #loading-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #1a1c2e 0%, #0f101d 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 99;
      transition: opacity 0.4s ease;
    }

    .loader {
      width: 42px; 
      height: 42px;
      border: 3.5px solid rgba(255, 255, 255, 0.15);
      border-top: 3.5px solid #8b5cf6; /* สีม่วงตามธีม Executive */
      border-radius: 50%;
      animation: spin 0.8s cubic-bezier(0.6, 0.2, 0.4, 0.8) infinite;
    }

    @keyframes spin { 
      0% { transform: rotate(0deg); } 
      100% { transform: rotate(360deg); } 
    }
  </style>
</head>
<body>

  <div id="loading-screen">
    <div class="loader"></div>
    <div style="color: #e2e8f0; margin-top: 16px; font-family: 'Segoe UI', Tahoma, sans-serif; font-size: 13px; letter-spacing: 0.8px; font-weight: 500;">
      กำลังเตรียมข้อมูลระบบบริหาร...
    </div>
  </div>

  <div class="app-container">
    <iframe
      id="appFrame"
      src="https://script.google.com/macros/s/AKfycbwXBDUn2vDHmZ0umvfRWLFAX9P2DliKcSJE4O_cYLcb1Skm66-VBUvKZX3k1FP9--4Dww/exec"
      allow="geolocation; camera; microphone"
      scrolling="yes"
      onload="hideLoader()"> 
    </iframe>
  </div>

  <script>
    function hideLoader() {
      const loader = document.getElementById('loading-screen');
      const frame = document.getElementById('appFrame');
      
      frame.style.opacity = '1';
      loader.style.opacity = '0';
      
      setTimeout(function() {
        loader.style.display = 'none';
      }, 400);
    }

    // ปรับรองรับการปรับระดับความสูงจาก Google Apps Script
    window.addEventListener('message', function(e) {
      if (e.data && e.data.frameHeight) {
        var frame = document.getElementById('appFrame');
        if (frame) {
          frame.style.height = e.data.frameHeight + 'px';
        }
      }
    }, false);

    // ป้องกันการย่อขยายหน้าจอที่อาจส่งผลต่อการจัดเลย์เอาต์บนมือถือ
    document.addEventListener('touchmove', function(e) {
      if (e.scale && e.scale !== 1) { 
        e.preventDefault(); 
      }
    }, { passive: false });
  </script>

</body>
</html>
