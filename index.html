<!-- แปะสคริปต์นี้ไว้ในไฟล์ index.html บน GitHub ของเพื่อน -->
<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxSXJ7kdEXE4uKWnjFKOclxW9HHOzR15OPX4zX9G7zMvBfnzEgNqGXKj7G8pWXo0Aypyg/exec";
/exe
async function loadDashboardData() {
  try {
    // ยิงไปดึงข้อมูลจากลิงก์ Web App ของพี่
   // แก้จากเดิม ให้ส่งคำขอแบบ POST และระบุ redirect ข้ามท่อความปลอดภัยของ Google
    const response = await fetch(WEB_APP_URL, {
      method: "POST",
      redirect: "follow"
    });
    const data = await response.json();
    
    // ตรงนี้ให้เพื่อนเอาตัวแปร data.records ไปใช้วาดกราฟหรือทำตารางฟิลเตอร์บนหน้าเว็บได้เลยครับ
    if (data && data.records) {
      alert("ดึงข้อมูลสำเร็จ! มีข้อมูลทั้งหมด " + data.records.length + " รายการ");
      // เพื่อนสามารถเอาไป Render หน้าจอต่อตรงนี้ได้เลย
    }
    
  } catch (error) {
    console.error("เกิดข้อผิดพลาดในการดึงข้อมูล:", error);
  }
}

// สั่งให้ทำงานทันทีที่เปิดหน้าเว็บ
window.onload = loadDashboardData;
</script>
