<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OT DISPENSER DispenserService</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1GhR1quDqH5UIkMWIygRGM1zT34W3kGOW">
  
  <!-- Mobile Web App & PWA Capabilities -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1e1b4b">

  <!-- เร่งความเร็วการดึงข้อมูลล่วงหน้า (Resource Preloading) -->
  <link rel="preconnect" href="https://script.google.com" crossorigin>
  <link rel="dns-prefetch" href="https://script.google.com">
  <link rel="preload" as="document" href="https://script.google.com/macros/s/AKfycbwXBDUn2vDHmZ0umvfRWLFAX9P2DliKcSJE4O_cYLcb1Skm66-VBUvKZX3k1FP9--4Dww/exec">

  <style>
    :root {
      --bg-dark: #0f172a;
      --indigo-primary: #1e1b4b;
      --purple-accent: #8b5cf6;
      --pink-accent: #ec4899;
      --text-light: #f8fafc;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0; 
      padding: 0;
      width: 100%; 
      height: 100%;
      height: 100dvh;
      background-color: #f8fafc;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    .app-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      opacity: 0;
      transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      -webkit-overflow-scrolling: touch;
    }

    /* Loading Screen สไตล์ Executive Glassmorphism */
    #loading-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: radial-gradient(circle at top right, #2e1065 0%, #0f172a 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 999;
      transition: opacity 0.4s ease, visibility 0.4s;
    }

    /* Executive Glass Card */
    .brand-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 32px 40px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
    }

    /* Modern Loader Ring (ไล่เฉดม่วง-ชมพู ตรงตามแบรนด์) */
    .loader-ring {
      position: relative;
      width: 60px;
      height: 60px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .loader-ring::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      border: 3px solid rgba(255, 255, 255, 0.08);
      border-top: 3px solid var(--purple-accent);
      border-right: 3px solid var(--pink-accent);
      border-radius: 50%;
      animation: spin 0.75s cubic-bezier(0.55, 0.15, 0.45, 0.85) infinite;
    }

    /* OT Clock Icon SVG */
    .ot-icon {
      width: 26px;
      height: 26px;
      fill: none;
      stroke: var(--pink-accent);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .brand-title {
      color: var(--text-light);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 2px;
      margin: 0;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .loading-status {
      color: #94a3b8;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- Loading Screen สไตล์ผู้บริหาร -->
  <div id="loading-screen">
    <div class="brand-card">
      <div class="loader-ring">
        <!-- Inline OT Clock SVG (โหลดไวใน 0.01s) -->
        <svg class="ot-icon" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"></circle>
          <polyline points="12 6 12 12 16 14"></polyline>
        </svg>
      </div>
      <div class="brand-title">OT DISPENSER SERVICE</div>
      <div class="loading-status">กำลังโหลด...</div>
    </div>
  </div>

  <div class="app-container">
    <iframe
      id="appFrame"
      src="https://script.google.com/macros/s/AKfycbwXBDUn2vDHmZ0umvfRWLFAX9P2DliKcSJE4O_cYLcb1Skm66-VBUvKZX3k1FP9--4Dww/exec"
      allow="geolocation; camera; microphone"
      scrolling="yes"
      onload="hideLoader()"> 
    </iframe>
  </div>

  <script>
    let isLoaded = false;

    function hideLoader() {
      if (isLoaded) return;
      isLoaded = true;

      const loader = document.getElementById('loading-screen');
      const frame = document.getElementById('appFrame');
      
      frame.style.opacity = '1';
      loader.style.opacity = '0';
      
      setTimeout(function() {
        loader.style.visibility = 'hidden';
      }, 400);
    }

    // Safety Timeout: หากเน็ตช้าเกิน 3 วินาที ให้ตัดเข้าหน้า Dashboard ทันที
    setTimeout(hideLoader, 3000);

    // ปรับความสูง iframe แบบอัตโนมัติเมื่อ Google Apps Script ส่งค่ามา
    window.addEventListener('message', function(e) {
      if (e.data && e.data.frameHeight) {
        var frame = document.getElementById('appFrame');
        if (frame) {
          frame.style.height = e.data.frameHeight + 'px';
        }
      }
    }, false);

    // ป้องกันการ Pinch-zoom บนสมาร์ตโฟน
    document.addEventListener('touchmove', function(e) {
      if (e.scale && e.scale !== 1) { 
        e.preventDefault(); 
      }
    }, { passive: false });
  </script>

</body>
</html>
